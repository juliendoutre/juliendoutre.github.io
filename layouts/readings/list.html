{{ define "main" }}

<style>
    .readings-timeline {
        position: relative;
        margin-top: 1.5rem;
        margin-left: 0.75rem;
        padding-left: 1.5rem;
    }

    .readings-timeline::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
        background: rgba(var(--color-neutral-200), 1);
    }

    .readings-entry {
        position: relative;
        margin-bottom: 1.5rem;
    }

    .readings-icon {
        position: absolute;
        left: -2.45rem;
        top: -0.05rem;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 1.75rem;
        height: 1.75rem;
        border-radius: 9999px;
        background: rgba(var(--color-primary-200), 1);
        border: 3px solid rgba(var(--color-neutral-50), 1);
    }

    .readings-icon svg {
        width: 1rem;
        height: 1rem;
        color: rgba(var(--color-primary-700), 1);
    }

    .readings-date {
        font-size: 0.8rem;
        color: rgba(var(--color-neutral-400), 1);
        margin-bottom: 0.25rem;
    }

    .readings-book {
        font-size: 0.95rem;
        color: rgba(var(--color-neutral-700), 1);
        line-height: 1.6;
    }

    .readings-book-title {
        font-style: italic;
    }

    .readings-book-author {
        color: rgba(var(--color-neutral-500), 1);
    }

    .readings-badge {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 600;
        padding: 0.1rem 0.5rem;
        border-radius: 9999px;
        margin-left: 0.4rem;
        vertical-align: middle;
        background: #def7ec;
        color: #03543f;
        border: 1px solid #84e1bc;
    }

    :is(.dark) .readings-badge {
        background: #014737;
        color: #bcf0da;
        border-color: #03543f;
    }
</style>

<h3 class="text-xl font-bold dark:text-white">{{ .Title }}</h3>

<p class="my-4 text-gray-500">
    {{ .Content }}
</p>

<div class="readings-timeline">
    {{ range .Params.readings }}
    <div class="readings-entry">
        <span class="readings-icon">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M5 19V4c0-.6.4-1 1-1h12c.6 0 1 .4 1 1v13H7a2 2 0 0 0-2 2Zm0 0c0 1.1.9 2 2 2h12M9 3v14m7 0v4" />
            </svg>
        </span>

        {{ if .date }}
        <div class="readings-date">{{ .date }}</div>
        {{ end }}

        {{ range .books }}
        <div class="readings-book">
            <span class="readings-book-title">{{ .title }}</span>,
            <span class="readings-book-author">{{ .author }}</span>
            {{ if .currently_reading }}
            <span class="readings-badge">Currently reading</span>
            {{ end }}
        </div>
        {{ end }}
    </div>
    {{ end }}
</div>
{{ end }}
